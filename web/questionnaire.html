<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ventus Client Questionnaire</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>body{background:#070707;color:#f5f5f5}.card{background:#111;border:1px solid #2a2a2a;border-radius:12px}.field{background:#0a0a0a;border:1px solid #333;border-radius:8px;padding:10px;color:#f5f5f5;width:100%}</style>
  <link rel="stylesheet" href="/assets/ventus-uniform.css"/>
</head><body>
<main class="max-w-3xl mx-auto p-6">
  <div class="card p-6">
    <h1 id="title" class="text-2xl font-bold mb-2">Client Questionnaire</h1>
    <p class="text-zinc-400 mb-4">Please complete this form so we can start your project with clarity.</p>
    <form id="form" class="space-y-3"></form>
    <button id="submitBtn" class="mt-4 px-4 py-2 rounded-full bg-orange-500 text-black font-bold">Submit Questionnaire</button>
    <p id="msg" class="text-sm text-zinc-400 mt-2"></p>
  </div>
</main>
<script>
const params=new URLSearchParams(location.search);const token=params.get('token');const form=document.getElementById('form');const msg=document.getElementById('msg');
let questions=[];
async function load(){if(!token){msg.textContent='Missing token';return;}const r=await fetch(`/api/questionnaire/${encodeURIComponent(token)}`);const j=await r.json();if(!r.ok||!j.ok){msg.textContent=j.error||'Not found';return;}questions=j.questionnaire.questions||[];document.getElementById('title').textContent=j.questionnaire.title||'Client Questionnaire';form.innerHTML=questions.map((q,i)=>`<div><label class='block text-sm mb-1'>${i+1}. ${q}</label><textarea class='field answer' data-index='${i}' rows='3'></textarea></div>`).join('');}

document.getElementById('submitBtn').onclick=async()=>{const answers=[...document.querySelectorAll('.answer')].map(a=>a.value.trim());if(answers.some(a=>!a)){msg.textContent='Please answer all questions.';return;}const r=await fetch(`/api/questionnaire/${encodeURIComponent(token)}/submit`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({answers})});const j=await r.json();msg.textContent=(r.ok&&j.ok)?'Submitted. Thank you!':(j.error||'Submission failed');};
load();
</script>
</body></html>
