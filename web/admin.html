<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ventus Admin</title><script src="https://cdn.tailwindcss.com"></script>
<style>body{background:#060606;color:#f5f5f5}.card{background:#111;border:1px solid #2a2a2a;border-radius:12px}.field{background:#0a0a0a;border:1px solid #333;border-radius:8px;padding:8px 10px;color:#f5f5f5}.btn{background:#f97316;color:#170d06;border-radius:999px;padding:8px 14px;font-weight:700}.btn-ghost{border:1px solid #444;color:#ddd;border-radius:999px;padding:8px 14px}</style>
</head><body>
<main class="max-w-7xl mx-auto p-6">
<h1 class="text-2xl font-bold mb-4">Ventus Admin Backend</h1>
<section id="authCard" class="card p-4 mb-4">
  <h2 class="font-semibold mb-3">Admin Login</h2>
  <div class="grid md:grid-cols-2 gap-2"><input id="email" class="field" type="email" placeholder="Admin email"/><input id="password" class="field" type="password" placeholder="Password"/></div>
  <div class="mt-3 flex gap-2"><button id="loginBtn" class="btn">Login</button><button id="bootstrapBtn" class="btn-ghost">Bootstrap First Admin</button></div>
  <p id="msg" class="text-sm text-zinc-400 mt-2"></p>
</section>

<section id="dash" class="hidden grid lg:grid-cols-3 gap-4">
  <div class="lg:col-span-2 card p-4">
    <div class="flex justify-between items-center mb-3"><p id="adminLine" class="text-sm text-zinc-300"></p><button id="logoutBtn" class="btn-ghost">Logout</button></div>
    <div class="overflow-x-auto">
      <table class="w-full text-sm"><thead class="text-zinc-400"><tr><th class="p-2 text-left">Business</th><th class="p-2 text-left">Workflow</th><th class="p-2 text-left">Verification</th><th class="p-2 text-left">Underwriting</th><th class="p-2 text-left">Counts</th><th class="p-2 text-left">Actions</th></tr></thead><tbody id="rows"></tbody></table>
    </div>
  </div>
  <div class="card p-4">
    <h3 class="font-bold mb-2">Application Workspace</h3>
    <p id="selectedLine" class="text-sm text-zinc-400 mb-3">Select an application row.</p>
    <div class="space-y-2 mb-3">
      <select id="workflowStatus" class="field"><option>new</option><option>verifying</option><option>needs-review</option><option>approved</option><option>declined</option><option>activated</option></select>
      <input id="workflowAssignee" class="field" placeholder="Assignee"/>
      <button id="saveWorkflowBtn" class="btn w-full">Save Workflow</button>
    </div>

    <div class="mb-3">
      <h4 class="font-semibold mb-1">Add Internal Note</h4>
      <textarea id="noteText" class="field w-full" placeholder="Note"></textarea>
      <button id="addNoteBtn" class="btn w-full mt-2">Add Note</button>
      <div id="notesList" class="mt-2 text-xs text-zinc-300 space-y-1 max-h-36 overflow-auto"></div>
    </div>

    <div>
      <h4 class="font-semibold mb-1">Create Task</h4>
      <input id="taskTitle" class="field mb-1" placeholder="Task title"/>
      <div class="grid grid-cols-2 gap-1"><input id="taskAssignee" class="field" placeholder="Assignee"/><input id="taskDue" class="field" type="date"/></div>
      <button id="addTaskBtn" class="btn w-full mt-2">Create Task</button>
      <div id="tasksList" class="mt-2 text-xs text-zinc-300 space-y-1 max-h-36 overflow-auto"></div>
    </div>
  </div>
</section>
</main>

<script>
const msg=document.getElementById('msg'),rowsEl=document.getElementById('rows'),authCard=document.getElementById('authCard'),dash=document.getElementById('dash'),adminLine=document.getElementById('adminLine');
let selectedAppId=null;

async function api(url,opts={}){const r=await fetch(url,opts);const j=await r.json().catch(()=>({ok:false,error:'Bad response'}));if(!r.ok||!j.ok) throw new Error(j.error||'Request failed');return j;}

async function loadApplications(){const j=await api('/api/admin/applications');rowsEl.innerHTML='';j.applications.forEach(a=>{const tr=document.createElement('tr');tr.className='border-t border-zinc-800';tr.innerHTML=`<td class='p-2'>${a.business_legal_name||''}<div class='text-xs text-zinc-500'>${a.email||''}</div></td><td class='p-2'>${a.workflow_status||'new'}<div class='text-xs text-zinc-500'>${a.workflow_assignee||'unassigned'}</div></td><td class='p-2'>${a.verification_status||'pending'} (${a.verification_score||0})</td><td class='p-2'>${a.underwriting_decision||'pending'} / $${a.underwriting_limit||0}</td><td class='p-2'>N:${a.notes_count||0} T:${a.tasks_count||0}</td><td class='p-2'><button class='btn-ghost open'>Open</button></td>`;tr.querySelector('.open').onclick=()=>selectApplication(a);rowsEl.appendChild(tr);});}

async function selectApplication(a){selectedAppId=a.application_id;document.getElementById('selectedLine').textContent=`Application #${a.application_id} - ${a.business_legal_name}`;document.getElementById('workflowStatus').value=a.workflow_status||'new';document.getElementById('workflowAssignee').value=a.workflow_assignee||'unassigned';await Promise.all([loadNotes(),loadTasks()]);}

async function loadNotes(){if(!selectedAppId) return;const j=await api(`/api/admin/application/${selectedAppId}/notes`);const el=document.getElementById('notesList');el.innerHTML=j.notes.map(n=>`<div class='card p-2'>${n.note}<div class='text-zinc-500'>${n.admin_email||'admin'} - ${n.created_at}</div></div>`).join('');}
async function loadTasks(){if(!selectedAppId) return;const j=await api(`/api/admin/application/${selectedAppId}/tasks`);const el=document.getElementById('tasksList');el.innerHTML=j.tasks.map(t=>`<div class='card p-2'>${t.title}<div class='text-zinc-500'>${t.status} | ${t.assignee||'unassigned'} | ${t.due_date||'no due'}</div></div>`).join('');}

document.getElementById('saveWorkflowBtn').onclick=async()=>{if(!selectedAppId) return;await api('/api/admin/application/status',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({applicationId:selectedAppId,status:document.getElementById('workflowStatus').value,assignee:document.getElementById('workflowAssignee').value})});msg.textContent='Workflow saved.';loadApplications();};
document.getElementById('addNoteBtn').onclick=async()=>{if(!selectedAppId) return;await api('/api/admin/application/note',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({applicationId:selectedAppId,note:document.getElementById('noteText').value})});document.getElementById('noteText').value='';loadNotes();loadApplications();};
document.getElementById('addTaskBtn').onclick=async()=>{if(!selectedAppId) return;await api('/api/admin/application/task',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({applicationId:selectedAppId,title:document.getElementById('taskTitle').value,assignee:document.getElementById('taskAssignee').value,dueDate:document.getElementById('taskDue').value,status:'todo'})});document.getElementById('taskTitle').value='';loadTasks();loadApplications();};

async function refreshAuth(){const r=await fetch('/api/admin/me');if(!r.ok){authCard.classList.remove('hidden');dash.classList.add('hidden');return;}const j=await r.json();authCard.classList.add('hidden');dash.classList.remove('hidden');adminLine.textContent=`Logged in as ${j.admin.email} (${j.admin.role})`;loadApplications();}

document.getElementById('loginBtn').onclick=async()=>{try{await api('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.getElementById('email').value.trim(),password:document.getElementById('password').value})});msg.textContent='';refreshAuth();}catch(e){msg.textContent=e.message;}};
document.getElementById('bootstrapBtn').onclick=async()=>{try{await api('/api/admin/bootstrap',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.getElementById('email').value.trim(),password:document.getElementById('password').value})});msg.textContent='Admin created.';}catch(e){msg.textContent=e.message;}};
document.getElementById('logoutBtn').onclick=async()=>{await fetch('/api/admin/logout',{method:'POST'});refreshAuth();};
refreshAuth();
</script>
</body></html>
